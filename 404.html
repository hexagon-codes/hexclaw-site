<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>页面不存在 - HexClaw</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">
<style>
  :root {
    --accent: #2e6588;
    --accent-rgb: 46, 101, 136;
    --border: rgba(46, 101, 136, 0.14);
    --border-strong: rgba(46, 101, 136, 0.22);
    --text: #172635;
    --muted: #617585;
    --muted-soft: #7c8c98;
    --panel: rgba(255, 255, 255, 0.76);
    --panel-strong: rgba(255, 255, 255, 0.92);
    --shadow: 0 28px 70px rgba(46, 101, 136, 0.12);
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --mono: "SF Mono", "Menlo", "Monaco", "Consolas", monospace;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 28px;
    font-family: var(--sans);
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(186, 215, 233, 0.5) 0%, rgba(186, 215, 233, 0) 34%),
      radial-gradient(circle at bottom right, rgba(210, 228, 240, 0.52) 0%, rgba(210, 228, 240, 0) 30%),
      linear-gradient(180deg, #fbfdff 0%, #eef5fa 100%);
    -webkit-font-smoothing: antialiased;
  }

  main {
    position: relative;
    width: min(920px, 100%);
    padding: 34px;
    border: 1px solid var(--border);
    border-radius: 30px;
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    overflow: hidden;
  }

  main::before {
    content: "";
    position: absolute;
    inset: -120px auto auto -120px;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(var(--accent-rgb), 0.12) 0%, rgba(var(--accent-rgb), 0) 72%);
    pointer-events: none;
  }

  .brand {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 28px;
    text-decoration: none;
    color: inherit;
  }

  .brand img {
    width: 36px;
    height: 36px;
    border-radius: 6px;
  }

  .brand span {
    font-size: 20px;
    font-weight: 700;
  }

  .hero {
    position: relative;
    display: grid;
    grid-template-columns: minmax(0, 1.25fr) minmax(260px, 0.75fr);
    gap: 24px;
    align-items: start;
    margin-bottom: 24px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 7px 13px;
    margin-bottom: 18px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.72);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  h1 {
    margin-bottom: 12px;
    font-size: clamp(34px, 5vw, 54px);
    line-height: 0.98;
    letter-spacing: -0.05em;
  }

  .lead {
    max-width: 620px;
    color: var(--muted);
    font-size: 18px;
    line-height: 1.8;
  }

  .signal {
    position: relative;
    padding: 20px;
    border: 1px solid var(--border);
    border-radius: 24px;
    background: var(--panel-strong);
  }

  .signal-label {
    margin-bottom: 8px;
    color: var(--muted-soft);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .signal-path {
    margin-bottom: 12px;
    word-break: break-word;
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .signal-note {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.75;
  }

  .actions {
    position: relative;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 18px;
  }

  .action {
    display: block;
    padding: 20px 20px 18px;
    border: 1px solid var(--border);
    border-radius: 22px;
    background: var(--panel-strong);
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }

  .action:hover {
    transform: translateY(-1px);
    border-color: var(--border-strong);
    box-shadow: 0 18px 36px rgba(var(--accent-rgb), 0.08);
    background: rgba(255, 255, 255, 0.98);
  }

  .action-kicker {
    margin-bottom: 8px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .action-title {
    margin-bottom: 6px;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
  }

  .action-desc {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.75;
  }

  .quick-links {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 18px;
  }

  .quick-links a {
    display: inline-flex;
    align-items: center;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.72);
    color: var(--accent);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
  }

  .quick-links a:hover {
    border-color: var(--border-strong);
    background: rgba(255, 255, 255, 0.94);
  }

  .footer {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 18px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
  }

  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  .footer a:hover {
    text-decoration: underline;
  }

  @media (max-width: 780px) {
    body {
      padding: 18px;
    }

    main {
      padding: 24px 20px;
      border-radius: 24px;
    }

    .hero {
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .actions {
      grid-template-columns: 1fr;
    }

    .lead {
      font-size: 16px;
    }
  }
</style>
</head>
