<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>页面不存在 - HexClaw</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
<style>
  :root {
    --blue: #5fb3ea; --blue-deep: #3f8fd4; --blue-light: #83c8f3;
    --accent: #3f8fd4;
    --accent-rgb: 63, 143, 212;
    --border: rgba(63, 143, 212, 0.12);
    --border-strong: rgba(95, 179, 234, 0.22);
    --text: #12324c;
    --muted: #3f5f7b;
    --muted-soft: #5f7b95;
    --panel: rgba(255, 255, 255, 0.78);
    --panel-strong: rgba(255, 255, 255, 0.92);
    --shadow: 0 16px 36px rgba(95, 179, 234, 0.08);
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --mono: "SF Mono", "Menlo", "Monaco", "Consolas", monospace;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 28px;
    font-family: var(--sans);
    color: var(--text);
    background:
      radial-gradient(circle at 50% 0%, rgba(250,253,255,.98) 0%, rgba(223,242,254,.92) 18%, rgba(170,219,248,.42) 42%, rgba(232,246,255,0) 72%),
      linear-gradient(180deg, #f4fbff 0%, #edf7ff 18%, #e8f6ff 100%);
    -webkit-font-smoothing: antialiased;
  }

  main {
    position: relative;
    width: min(920px, 100%);
    padding: 34px;
    border: 1px solid var(--border);
    border-radius: 30px;
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    overflow: hidden;
  }

  main::before {
    content: "";
    position: absolute;
    inset: -120px auto auto -120px;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(var(--accent-rgb), 0.12) 0%, rgba(var(--accent-rgb), 0) 72%);
    pointer-events: none;
  }

  .crab-404 {
    font-size: 64px;
    text-align: center;
    margin-bottom: 12px;
    animation: crab-wave 2s ease-in-out infinite;
  }
  @keyframes crab-wave {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-8deg); }
    75% { transform: rotate(8deg); }
  }

  .brand {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 28px;
    text-decoration: none;
    color: inherit;
  }

  .brand img {
    width: 36px;
    height: 36px;
    border-radius: 6px;
  }

  .brand span {
    font-size: 20px;
    font-weight: 700;
  }

  .hero {
    position: relative;
    display: grid;
    grid-template-columns: minmax(0, 1.25fr) minmax(260px, 0.75fr);
    gap: 24px;
    align-items: start;
    margin-bottom: 24px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 7px 13px;
    margin-bottom: 18px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.72);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  h1 {
    margin-bottom: 12px;
    font-size: clamp(34px, 5vw, 54px);
    line-height: 0.98;
    letter-spacing: -0.05em;
  }

  .lead {
    max-width: 620px;
    color: var(--muted);
    font-size: 18px;
    line-height: 1.8;
  }

  .signal {
    position: relative;
    padding: 20px;
    border: 1px solid var(--border);
    border-radius: 24px;
    background: var(--panel-strong);
  }

  .signal-label {
    margin-bottom: 8px;
    color: var(--muted-soft);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .signal-path {
    margin-bottom: 12px;
    word-break: break-word;
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .signal-note {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.75;
  }

  .actions {
    position: relative;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 18px;
  }

  .action {
    display: block;
    padding: 20px 20px 18px;
    border: 1px solid var(--border);
    border-radius: 22px;
    background: var(--panel-strong);
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }

  .action:hover {
    transform: translateY(-2px);
    border-color: var(--border-strong);
    box-shadow: 0 0 0 1px rgba(95,179,234,0.2), 0 16px 36px rgba(95,179,234,0.12);
    background: rgba(255, 255, 255, 0.98);
  }

  .action-kicker {
    margin-bottom: 8px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .action-title {
    margin-bottom: 6px;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
  }

  .action-desc {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.75;
  }

  .quick-links {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 18px;
  }

  .quick-links a {
    display: inline-flex;
    align-items: center;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.72);
    color: var(--accent);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
  }

  .quick-links a:hover {
    border-color: var(--border-strong);
    background: rgba(255, 255, 255, 0.94);
  }

  .footer {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 18px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
  }

  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  .footer a:hover {
    text-decoration: underline;
  }

  @media (max-width: 780px) {
    body {
      padding: 18px;
    }

    main {
      padding: 24px 20px;
      border-radius: 24px;
    }

    .hero {
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .actions {
      grid-template-columns: 1fr;
    }

    .lead {
      font-size: 16px;
    }
  }
</style>
</head>
<body>
<main>
  <a class="brand" href="/zh/index.html">
    <img src="/assets/brand/hexclaw-icon-72.png" alt="HexClaw">
    <span>HexClaw</span>
  </a>

  <section class="hero">
    <div>
      <div class="crab-404">🦀</div>
      <div class="eyebrow">404 Not Found</div>
      <h1 id="title">页面不存在</h1>
      <p class="lead" id="lead">你访问的地址没有对应页面。可以回到站点入口，或者继续进入文档与快速上手页面。</p>
    </div>
    <aside class="signal">
      <div class="signal-label" id="path-label">请求路径</div>
      <div class="signal-path" id="path-value">/</div>
      <p class="signal-note" id="signal-note">如果这是一个旧链接，页面可能已经迁移到新的语言目录或文档入口。</p>
    </aside>
  </section>

  <section class="actions" id="actions"></section>
  <nav class="quick-links" id="quick-links"></nav>

  <div class="footer">
    <span><a href="https://github.com/hexagon-codes/hexclaw-desktop" target="_blank" rel="noopener noreferrer">GitHub</a></span>
    <span><a href="mailto:ai@hexclaw.net">ai@hexclaw.net</a></span>
    <span><a href="mailto:support@hexclaw.net">support@hexclaw.net</a></span>
  </div>
</main>

<script>
  const path = window.location.pathname || "/";
  const explicitLocale = path === "/en" || path.startsWith("/en/") ? "en"
    : path === "/zh" || path.startsWith("/zh/") ? "zh"
    : null;
  const browserPrefersEnglish = (navigator.language || "").toLowerCase().startsWith("en");
  const locale = explicitLocale || (browserPrefersEnglish ? "en" : "zh");
  const inDocs = /\/docs(\/|$)/.test(path);

  const copy = {
    zh: {
      lang: "zh-CN",
      pageTitle: "页面不存在 - HexClaw",
      title: "页面不存在",
      lead: "你访问的地址没有对应页面。可以回到站点入口，或者继续进入文档与快速上手页面。",
      pathLabel: "请求路径",
      signalNote: "如果这是一个旧链接，页面可能已经迁移到新的语言目录或文档入口。",
      actions: [
        {
          kicker: "Recommended",
          title: inDocs ? "进入中文文档首页" : "返回中文首页",
          desc: inDocs ? "从文档中心重新进入，继续查找安装、配置和功能说明。" : "回到默认中文站点入口，继续浏览产品介绍与下载内容。",
          href: inDocs ? "/zh/docs/index.html" : "/zh/index.html"
        },
        {
          kicker: "Quick Start",
          title: "查看快速上手",
          desc: "直接进入安装、配置服务商和第一条消息的引导页。",
          href: "/zh/docs/getting-started.html"
        },
        {
          kicker: "Alternate Language",
          title: "打开英文站点",
          desc: "如果你本来想访问英文内容，可以从英文首页重新进入。",
          href: "/en/index.html"
        },
        {
          kicker: "Docs Hub",
          title: "浏览中文文档",
          desc: "查看对话、Agent、工作流画布、模型服务商等文档页面。",
          href: "/zh/docs/index.html"
        }
      ],
      quickLinks: [
        { label: "中文首页", href: "/zh/index.html" },
        { label: "中文文档", href: "/zh/docs/index.html" },
        { label: "快速上手", href: "/zh/docs/getting-started.html" },
        { label: "英文站点", href: "/en/index.html" }
      ]
    },
    en: {
      lang: "en",
      pageTitle: "Page Not Found - HexClaw",
      title: "Page Not Found",
      lead: "The address you opened does not map to a live page. Continue from the site home, docs hub, or the getting started guide.",
      pathLabel: "Requested Path",
      signalNote: "If this was an old link, the page may have moved into a language-specific route or the docs section.",
      actions: [
        {
          kicker: "Recommended",
          title: inDocs ? "Open English Docs" : "Go To English Home",
          desc: inDocs ? "Start again from the docs hub and continue into setup, configuration, and feature guides." : "Return to the English landing page and continue from the main product entry point.",
          href: inDocs ? "/en/docs/index.html" : "/en/index.html"
        },
        {
          kicker: "Quick Start",
          title: "Open Getting Started",
          desc: "Jump straight to installation, provider setup, and your first message workflow.",
          href: "/en/docs/getting-started.html"
        },
        {
          kicker: "Alternate Language",
          title: "查看中文站点",
          desc: "If you intended to browse the default Simplified Chinese site, continue from the main Chinese entry.",
          href: "/zh/index.html"
        },
        {
          kicker: "Docs Hub",
          title: "Browse English Docs",
          desc: "Open guides for chat, agents, workflow canvas, model providers, and more.",
          href: "/en/docs/index.html"
        }
      ],
      quickLinks: [
        { label: "English Home", href: "/en/index.html" },
        { label: "English Docs", href: "/en/docs/index.html" },
        { label: "Getting Started", href: "/en/docs/getting-started.html" },
        { label: "中文站点", href: "/zh/index.html" }
      ]
    }
  };

  const current = copy[locale];
  document.documentElement.lang = current.lang;
  document.title = current.pageTitle;
  document.getElementById("title").textContent = current.title;
  document.getElementById("lead").textContent = current.lead;
  document.getElementById("path-label").textContent = current.pathLabel;
  document.getElementById("path-value").textContent = path;
  document.getElementById("signal-note").textContent = current.signalNote;

  const brand = document.querySelector(".brand");
  brand.href = locale === "en" ? "/en/index.html" : "/zh/index.html";

  const actions = document.getElementById("actions");
  actions.innerHTML = current.actions.map((item) => `
    <a class="action" href="${item.href}">
      <div class="action-kicker">${item.kicker}</div>
      <div class="action-title">${item.title}</div>
      <div class="action-desc">${item.desc}</div>
    </a>
  `).join("");

  const quickLinks = document.getElementById("quick-links");
  quickLinks.innerHTML = current.quickLinks.map((item) => `
    <a href="${item.href}">${item.label}</a>
  `).join("");
</script>
</body>
</html>
